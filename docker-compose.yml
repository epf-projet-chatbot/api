# ================================
# 🚀 CHATBOT API DOCKER COMPOSE
# ================================
version: '3.8'

services:
  # ================================
  # 🤖 API SERVICE
  # ================================
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-api-local
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DATABASE_NAME=chatbot_db
      - CHROMA_PATH=./chroma_db
      - GOOGLE_API_KEY=
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002
      - BASE_URL=http://localhost:8000
      - ENVIRONMENT=development
      - PYTHONPATH=/workdir:/workdir/app
    volumes:
      - uploads-data:/workdir/uploads  # Persistent uploads
      - chroma-data:/workdir/chroma_db  # Persistent vector database
      - .:/workdir  # Volume de développement pour hot reload - tout le projet
    working_dir: /workdir/app
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chatbot-network

  # ================================
  # 🗄️ MONGODB SERVICE (LOCAL)
  # ================================
  mongo:
    image: mongo:7-jammy
    container_name: chatbot-mongo-local
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=chatbot_db
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - chatbot-network

  # ================================
  # 📊 MONGO EXPRESS (DEV TOOLS)
  # ================================
  mongo-express:
    image: mongo-express:latest
    container_name: chatbot-mongo-express-local
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chatbot-network
    profiles:
      - dev  # Lance avec: docker-compose --profile dev up

# ================================
# 💾 PERSISTENT VOLUMES
# ================================
volumes:
  mongo-data:
    driver: local
  uploads-data:
    driver: local
  chroma-data:
    driver: local

# ================================
# 🌐 NETWORKS
# ================================
networks:
  chatbot-network:
    driver: bridge
